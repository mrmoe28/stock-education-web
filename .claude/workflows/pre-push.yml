name: Pre-Push Validation
on:
  pre-push:
    description: "Runs before each git push to ensure code quality"

steps:
  - name: "Build Check"
    run: npm run build
    continue_on_error: false
    
  - name: "Lint Check" 
    run: npm run lint
    continue_on_error: true
    fix: "claude --prompt 'Fix ESLint errors in the codebase'"
    
  - name: "Type Check"
    run: npx tsc --noEmit
    continue_on_error: true
    fix: "claude --prompt 'Fix TypeScript compilation errors'"
    
  - name: "Test Check"
    run: npm test --passWithNoTests
    continue_on_error: true
    
notifications:
  on_success: "✅ Pre-push validation passed"
  on_failure: "❌ Pre-push validation failed - attempting auto-fix"
  on_fix: "🔧 Auto-fix applied - please review changes"